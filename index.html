<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sandtrix</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="machine" aria-label="Sandtrix">
      <section class="play-shell" aria-label="Playfield">
        <div class="rail rail-left" aria-hidden="true"></div>
        <canvas id="game" width="480" height="720" aria-label="Sandtrix playfield"></canvas>
        <div class="rail rail-right" aria-hidden="true"></div>
      </section>

      <aside class="panel" aria-label="Status panel">
        <div class="pipework" aria-hidden="true">
          <div class="pipe pipe-vertical"></div>
          <div class="pipe pipe-curve"></div>
          <div class="pipe pipe-horizontal hot"></div>
          <div class="vent">
            <span></span>
          </div>
        </div>

        <section class="display preview">
          <div class="display-label">NEXT</div>
          <canvas id="next" width="180" height="120" aria-label="Next piece"></canvas>
        </section>

        <section class="display stats">
          <div>
            <span>TIME</span>
            <strong id="time">00:00</strong>
          </div>
          <div>
            <span>SCORE</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span>CLEARS</span>
            <strong id="lines">0</strong>
          </div>
          <div>
            <span>LEVEL</span>
            <strong id="level">1</strong>
          </div>
        </section>

        <section class="display meter-display" aria-label="Pile height">
          <div class="meter">
            <span id="dangerFill"></span>
          </div>
        </section>

        <section class="display best">
          <span>BEST</span>
          <strong id="best">0</strong>
        </section>

        <div class="actions">
          <button id="pauseBtn" type="button" title="Pause" aria-label="Pause">||</button>
        </div>
      </aside>
    </main>

    <section id="startScreen" class="start-screen" aria-label="Start screen">
      <div class="start-card">
        <h1>砂テトリス</h1>
        <p class="start-rule">同じ色の砂を左端から右端までつなげると、そのつながった砂だけ消えます。</p>
        <div class="start-controls">
          <div>
            <h2>スマホ</h2>
            <p>一時停止以外をタップ: 回転</p>
            <p>左右スワイプ: 移動</p>
            <p>下スワイプ: 落下</p>
            <p>上スワイプ: 一気に落下</p>
          </div>
          <div>
            <h2>PC</h2>
            <p>← 左移動</p>
            <p>→ 右移動</p>
            <p>↓ 落下</p>
            <p>Z 左回転</p>
            <p>X 右回転</p>
            <p>↑ 一気に落下</p>
          </div>
        </div>
        <p class="start-prompt">タップ / クリック / キー入力でスタート</p>
      </div>
    </section>

    <script src="game.js"></script>
  </body>
</html>
